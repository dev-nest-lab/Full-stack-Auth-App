name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend_python/requirements.txt
          pip install pytest
      - name: Run backend tests
        working-directory: backend_python
        env:
          PYTHONPATH: .
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: pytest
      # - name: Run backend tests
      #   working-directory: backend_python #becasue i added pytest to the requirements.txt.continue-on-error: 
      #   run: pytest

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build